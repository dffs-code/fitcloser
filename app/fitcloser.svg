    <path d="M6410 7458 c-58 -30 -83 -73 -83 -145 0 -39 6 -62 20 -81 74 -101
216 -96 271 9 56 106 -19 239 -136 239 -15 0 -48 -10 -72 -22z"
      fill="url(#accentGrad)" stroke="#0f172a" stroke-width="30" />

    <!-- Pequenos realces em cor clara -->
    <g fill="none" stroke="#f8fbff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1200 1700 c180 -60 360 -60 540 0"/>
      <path d="M7600 1700 c180 -60 360 -60 540 0"/>
    </g>

  </g>

  <!-- Sombra de superfície -->
  <ellipse cx="512" cy="820" rx="220" ry="40" fill="rgba(59,130,246,0.06)"/>

</svg>
