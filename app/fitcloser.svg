<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Ícone de braço segurando haltere com gradiente horizontal ajustado">
  <defs>
    <style>
      .bg { fill: #f8fbff; }
      .stroke { stroke: #0f172a; stroke-linecap: round; stroke-linejoin: round; }
    </style>

    <!-- Gradiente principal: da esquerda (claro) para a direita (escuro).
         A parte escura começa aproximadamente na dobra entre braço e bíceps (cerca de 50-55%). -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(59,130,246,0.12)"/>
      <stop offset="45%" stop-color="rgba(59,130,246,0.12)"/>
      <stop offset="50%" stop-color="rgba(59,130,246,0.18)"/>
      <stop offset="55%" stop-color="rgba(59,130,246,0.24)"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Gradiente de destaque com transição mais concentrada perto da dobra -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(59,130,246,0.12)"/>
      <stop offset="48%" stop-color="rgba(59,130,246,0.14)"/>
      <stop offset="60%" stop-color="rgba(59,130,246,0.24)"/>
    </linearGradient>

    <!-- Halo suave -->
    <radialGradient id="halo" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(59,130,246,0.12)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0)"/>
    </radialGradient>

    <!-- Sombra suave -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="rgba(59,130,246,0.24)"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect class="bg" width="100%" height="100%" rx="0" ry="0"/>

  <!-- Halo atrás do ícone -->
  <g transform="translate(512,360)">
    <circle r="260" fill="url(#halo)"/>
  </g>

  <!-- Grupo com paths originais, preenchidos com o gradiente horizontal ajustado -->
  <g transform="translate(0,1024) scale(0.1,-0.1)" filter="url(#softShadow)">

